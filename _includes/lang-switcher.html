<div class="lang-switcher">
  {% for lang in site.languages %}
    <a class="lang-switcher__item lang-switcher__link" href="{% if lang == site.default_lang %}/{% else %}/{{ lang }}/{% endif %}" data-lang="{{ lang }}">{{ lang | upcase }}</a>
    {% unless forloop.last %}<span class="lang-switcher__sep"></span>{% endunless %}
  {% endfor %}
</div>
<script>
(function () {
  var defaultLang = "{{ site.default_lang }}";
  {% assign non_default_langs = "" %}
  {% for lang in site.languages %}
    {% unless lang == site.default_lang %}
      {% if non_default_langs != "" %}{% assign non_default_langs = non_default_langs | append: "," %}{% endif %}
      {% assign non_default_langs = non_default_langs | append: '"' | append: lang | append: '"' %}
    {% endunless %}
  {% endfor %}
  var langCodes = [{{ non_default_langs }}];

  var path = window.location.pathname;

  var currentLang = defaultLang;
  for (var i = 0; i < langCodes.length; i++) {
    var prefix = '/' + langCodes[i];
    if (path === prefix || path.indexOf(prefix + '/') === 0) {
      currentLang = langCodes[i];
      break;
    }
  }

  var basePath = currentLang !== defaultLang
    ? (path.slice(('/' + currentLang).length) || '/')
    : path;

  // Pagination pages (/page2/, /page3/, …) are language-specific — send to the other language's homepage
  var isPagination = /^\/page\d+\/?$/.test(basePath);
  var switchPath = isPagination ? '/' : basePath;

  document.querySelectorAll('.lang-switcher__link').forEach(function (link) {
    var targetLang = link.getAttribute('data-lang');
    if (targetLang === currentLang) {
      link.classList.add('lang-switcher__item--active');
    } else if (targetLang === defaultLang) {
      link.href = switchPath;
    } else {
      link.href = '/' + targetLang + switchPath;
    }
  });
})();
</script>
