<div class="lang-switcher">
  {% for lang in site.languages %}
    {% if lang == page.lang or (page.lang == nil and lang == site.default_lang) %}
      <span class="lang-switcher__item lang-switcher__item--active" data-lang="{{ lang }}">{{ lang | upcase }}</span>
    {% elsif lang == site.default_lang %}
      <a class="lang-switcher__item lang-switcher__link" href="/" data-lang="{{ lang }}">{{ lang | upcase }}</a>
    {% else %}
      <a class="lang-switcher__item lang-switcher__link" href="/{{ lang }}/" data-lang="{{ lang }}">{{ lang | upcase }}</a>
    {% endif %}
    {% unless forloop.last %}<span class="lang-switcher__sep">|</span>{% endunless %}
  {% endfor %}
</div>
<script>
(function () {
  var path = window.location.pathname;
  document.querySelectorAll('.lang-switcher__link').forEach(function (link) {
    var lang = link.getAttribute('data-lang');
    if (lang === 'en') {
      link.href = path.replace(/^\/fr/, '') || '/';
    } else {
      var base = path.replace(/^\/fr/, '') || '/';
      link.href = '/fr' + (base === '/' ? '/' : base);
    }
  });
})();
</script>
