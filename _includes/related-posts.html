{% include get-translation-data.html %}
{% assign ui_t = _t_data.ui %}
{% comment %} Embed language-filtered posts as JSON; JS handles filtering, shuffling, and rendering {% endcomment %}
<script id="related-posts-data" type="application/json">
{
  "currentUrl": "{{ page.url | absolute_url }}",
  "currentTags": {{ page.tags | jsonify }},
  "posts": [
    {% assign lang_posts = site.posts | where: "lang", active_lang %}
    {% for post in lang_posts %}
    {% if post.lang != site.default_lang %}
      {% assign expected_prefix = '/' | append: post.lang | append: '/' %}
      {% if post.url contains expected_prefix %}
        {% assign post_url = post.url %}
      {% else %}
        {% assign post_url = post.url | prepend: post.lang | prepend: '/' %}
      {% endif %}
    {% else %}
      {% assign post_url = post.url %}
    {% endif %}
    {%- assign _date_format = site.date_format | default: "%B %-d, %Y" -%}
    {%- if ui_t.months -%}
      {%- assign _rp_mi = post.date | date: "%-m" | minus: 1 -%}
      {%- assign _rp_mn = ui_t.months | split: "," -%}
      {%- assign _rp_mn = _rp_mn[_rp_mi] -%}
      {%- assign _rp_d  = post.date | date: "%-d" -%}
      {%- assign _rp_y  = post.date | date: "%Y" -%}
      {%- if ui_t.date_day_first -%}
        {%- capture _rp_date %}{{ _rp_d }} {{ _rp_mn }} {{ _rp_y }}{% endcapture -%}
      {%- else -%}
        {%- capture _rp_date %}{{ _rp_mn }} {{ _rp_d }}, {{ _rp_y }}{% endcapture -%}
      {%- endif -%}
    {%- else -%}
      {%- assign _rp_date = post.date | date: _date_format -%}
    {%- endif -%}
    {
      "url": {{ post_url | absolute_url | jsonify }},
      "title": {{ post.title | strip_html | jsonify }},
      "excerpt": {{ post.excerpt | strip_html | truncatewords: 30 | jsonify }},
      "thumbnail": {% if post.thumbnail-img %}{{ post.thumbnail-img | absolute_url | jsonify }}{% elsif post.cover-img %}{% if post.cover-img.first %}{{ post.cover-img[0].first.first | absolute_url | jsonify }}{% else %}{{ post.cover-img | absolute_url | jsonify }}{% endif %}{% else %}""{% endif %},
      "tags": {{ post.tags | jsonify }},
      "author": {{ post.author | default: "" | jsonify }},
      "authorAvatar": {{ post.author-avatar | default: "" | absolute_url | jsonify }},
      "date": {{ _rp_date | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>

<section class="keep-reading" id="keep-reading-section" style="display:none">
  <h2 class="keep-reading__title">{{ ui_t.keep_reading | default: "Keep Reading" }}</h2>
  <div class="card-grid card-grid--related" id="keep-reading-grid"></div>
</section>

<script>
(function () {
  var dataEl = document.getElementById('related-posts-data');
  if (!dataEl) return;
  var data        = JSON.parse(dataEl.textContent);
  var currentUrl  = data.currentUrl;
  var currentTags = data.currentTags;
  var all         = data.posts.filter(function (p) { return p.url !== currentUrl; });

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var related = shuffle(all.filter(function (p) {
    return p.tags.some(function (t) { return currentTags.indexOf(t) >= 0; });
  })).slice(0, 3);

  if (related.length < 3) {
    var used   = related.map(function (p) { return p.url; });
    var others = shuffle(all.filter(function (p) { return used.indexOf(p.url) < 0; }));
    related    = related.concat(others.slice(0, 3 - related.length));
  }

  var grid = document.getElementById('keep-reading-grid');
  if (!grid || !related.length) return;

  related.forEach(function (post) {
    var html = '';
    if (post.thumbnail) {
      html += '<a href="' + post.url + '" class="card__image-wrap" aria-label="' + esc(post.title) + '">'
            + '<img src="' + post.thumbnail + '" alt="' + esc(post.title) + '" loading="lazy"></a>';
    }
    html += '<div class="card__body">';
    if (post.tags.length) {
      html += '<div class="card__tags">';
      post.tags.forEach(function (t) { html += '<span class="card__tag">' + esc(t) + '</span>'; });
      html += '</div>';
    }
    html += '<a href="' + post.url + '" class="card__title-link"><h2 class="card__title">' + esc(post.title) + '</h2></a>'
          + '<p class="card__excerpt">' + esc(post.excerpt) + '</p>'
          + '<div class="card__meta"><div class="card__author">';
    if (post.authorAvatar) {
      html += '<img class="card__author-avatar" src="' + post.authorAvatar + '" alt="' + esc(post.author) + '">';
    }
    html += '<div class="card__author-info">';
    if (post.author) html += '<span class="card__author-name">' + esc(post.author) + '</span>';
    html += '<span class="card__author-date">' + esc(post.date) + '</span>'
          + '</div></div></div></div>';

    var article       = document.createElement('article');
    article.className = 'card';
    article.innerHTML = html;
    grid.appendChild(article);
  });

  document.getElementById('keep-reading-section').style.display = '';
})();
</script>
